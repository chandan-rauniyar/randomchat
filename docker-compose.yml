services:


  # PostgreSQL — local dev database
  postgres:
    image: postgres:16-alpine
    container_name: randomchat_postgres
    environment:
      POSTGRES_DB: randomchat_dev
      POSTGRES_USER: randomchat
      POSTGRES_PASSWORD: randomchat_dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U randomchat -d randomchat_dev"]
      interval: 10s
      timeout: 5s
      retries: 5


  # Redis — local dev cache/queue
  redis:
    image: redis:7-alpine
    container_name: randomchat_redis
    ports:
      - "6380:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # pgAdmin — visual DB browser (optional but very helpful)
  # Access at: http://localhost:5051
  # Login: admin@admin.com / admin
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: randomchat_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres
    profiles:
      - tools                               # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data: